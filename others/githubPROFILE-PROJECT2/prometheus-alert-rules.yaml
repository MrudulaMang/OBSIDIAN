# observability/alerting/alert-rules.yaml
# Production alert rules — tuned to reduce noise
# Every alert has: severity, runbook link, and clear description

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-alerts
  namespace: monitoring
spec:
  groups:

    # ── Availability Alerts ───────────────────────────────────────────────────
    - name: availability
      rules:

        - alert: ServiceDown
          expr: up{job!~"kube-.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "{{ $labels.instance }} has been unreachable for 2 minutes."
            runbook: "https://runbooks.myorg.com/service-down"

        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (service)
            /
            sum(rate(http_requests_total[5m])) by (service)
            > 0.05
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "High error rate on {{ $labels.service }}"
            description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"
            runbook: "https://runbooks.myorg.com/high-error-rate"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket[5m])) by (le, service)
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High p99 latency on {{ $labels.service }}"
            description: "p99 latency is {{ $value | humanizeDuration }} (threshold: 2s)"
            runbook: "https://runbooks.myorg.com/high-latency"

    # ── Infrastructure Alerts ─────────────────────────────────────────────────
    - name: infrastructure
      rules:

        - alert: NodeMemoryPressure
          expr: |
            (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} memory below 10%"
            runbook: "https://runbooks.myorg.com/node-memory-pressure"

        - alert: PersistentVolumeAlmostFull
          expr: |
            (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) < 0.15
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is 85%+ full"
            runbook: "https://runbooks.myorg.com/pvc-full"

        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total[15m]) > 3
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash looping"
            description: "{{ $value }} restarts in the last 15 minutes"
            runbook: "https://runbooks.myorg.com/pod-crashloop"

    # ── Cost Alerts ───────────────────────────────────────────────────────────
    - name: cost
      rules:

        - alert: UnusedNodeRunning
          expr: |
            sum(karpenter_nodes_allocatable{resource="cpu"}) by (node)
            -
            sum(karpenter_pods_requested{resource="cpu"}) by (node)
            > 3.5
          for: 30m
          labels:
            severity: info
          annotations:
            summary: "Node {{ $labels.node }} underutilised for 30 minutes"
            description: "Karpenter should consolidate — check if consolidation is blocked"
            runbook: "https://runbooks.myorg.com/unused-node"
